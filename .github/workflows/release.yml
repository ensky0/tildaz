name: Release

# 트리거
#   - 태그 푸시 (v*): dist/release.sh 가 tag + push 하면 자동 실행
#   - workflow_dispatch: 수동 재시도 / Actions 단독 실행. 태그 이름 입력 필수.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v0.2.9)'
        required: true

permissions:
  contents: write   # gh release create 에 필요

# Node.js 20 deprecation (2026-09-16 제거 예정) 회피. actions/checkout@v4 와
# softprops/action-gh-release@v2 가 아직 Node 20 번들이라 runner 가 강제 Node
# 24 로 실행. 2026-06-02 부터 default 가 24 로 바뀌면 이 env 는 redundant
# 이지만 그때까지 deprecation 경고 + 호환성 보장 위한 안전한 사전 적용.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release-windows:
    # x64 + arm64 두 architecture 를 windows-2022 (x86_64 호스트) 에서 cross-build.
    # zig 가 PE/COFF 양쪽 모두 cross 가능 + 우리 의존성 (kernel32 / user32 / ConPTY
    # bundle) 은 arch 별 binary 를 빌드 시점에 선택 ([build.zig:166](build.zig#L166)).
    # ARM64 실 device smoke test 는 별도 후속 작업 (#191 완료 조건의 별 항목).
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            zig_target: x86_64-windows
          - arch: arm64
            zig_target: aarch64-windows
    runs-on: windows-2022
    steps:
      - name: Resolve tag / version
        id: vars
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 1

      # mlugg/setup-zig 는 community mirror list fallback 내장 (ziglang.org 가
      # Actions runner 에서 mid-transfer RST 던지는 케이스를 흡수). 과거 v1 시점
      # 에는 0.15.x 의 새 파일명 패턴 (`zig-x86_64-windows-...`) 미지원으로 깨졌으나
      # v2.2.0+ 에서 fix 됨. action 의 use-cache 는 false — 우리가 ZIG_GLOBAL_CACHE_DIR
      # 을 직접 D: 로 맞춰야 cross-drive convertPathArg assert 회피 가능 (아래 step).
      - name: Setup Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      # windows-2022 러너의 checkout 은 D:\ 에 떨어지는데 기본 zig global cache 는
      # C:\Users\runneradmin\AppData\Local\zig 라 크로스 드라이브.
      # std.fs.path.relative(C:..., D:...) 가 상대경로를 못 만들고 absolute 리턴 →
      # zig Run step (convertPathArg) assert. ZIG_GLOBAL_CACHE_DIR 을 RUNNER_TEMP
      # (D:) 로 통일해 해결.
      - name: "Set Zig global cache dir on D:"
        shell: bash
        run: |
          echo "ZIG_GLOBAL_CACHE_DIR=${RUNNER_TEMP}/zig-global-cache" >> "$GITHUB_ENV"

      - name: Verify Zig
        shell: bash
        run: zig version

      - name: Sanity checks (version / release notes / pinned deps)
        shell: bash
        run: |
          set -euo pipefail

          BZIG_VER=$(sed -n 's/^const tildaz_version = "\([^"]*\)";.*/\1/p' build.zig)
          # prerelease (-rc* / -beta* / -alpha*) tag 는 base version (= 첫 `-` 앞까지) 만 build.zig 와 매칭.
          # `0.5.0-rc1` → `0.5.0` 비교. build.zig 의 tildaz_version 은 base 유지.
          BASE_VER="${{ steps.vars.outputs.version }}"
          BASE_VER="${BASE_VER%-*}"
          if [[ "$BZIG_VER" != "$BASE_VER" ]]; then
            echo "ERROR: build.zig tildaz_version ($BZIG_VER) != tag base version ($BASE_VER, full tag ${{ steps.vars.outputs.tag }})"
            exit 1
          fi

          NOTES="dist/release-notes/${{ steps.vars.outputs.tag }}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "ERROR: release notes missing at $NOTES"
            exit 1
          fi

          # build.zig.zon 의 github archive URL 은 전부 특정 SHA 로 pin 되어야 함.
          # refs/heads/ · refs/tags/ 같은 rolling reference 는 upstream 이 움직이면
          # CI fetch 가 해시 불일치로 터지므로 금지. (과거 c41a9ef → e10e78f 회귀로
          # 한 번 깨진 뒤 v0.2.10 에서 다시 핀 + 이 check 추가)
          BAD=$(grep -E '\.url[[:space:]]*=[[:space:]]*"https://github\.com/' build.zig.zon | grep -v -E '/archive/[0-9a-f]{40}\.tar\.gz"' || true)
          if [[ -n "$BAD" ]]; then
            echo "ERROR: build.zig.zon 에 rolling / non-SHA dependency URL 이 있음:"
            echo "$BAD"
            echo ""
            echo "github archive URL 은 반드시"
            echo "  https://github.com/<org>/<repo>/archive/<40-hex-sha>.tar.gz"
            echo "형식이어야 합니다. refs/heads/ 나 refs/tags/ 는 금지."
            echo ""
            echo "갱신하려면: ./dist/update-ghostty.sh"
            exit 1
          fi

          echo "build.zig version : $BZIG_VER"
          echo "release notes     : $NOTES"
          echo "pinned deps       : OK"

      # Zig 0.15 의 Windows HTTP client 가 github.com 에서 transitive deps
      # (ghostty 아래 imgui, vaxis 아래 zigimg / uucode 등) 를 받을 때 가끔
      # `HttpConnectionClosing` / `WriteFailed` 로 깨짐. fetch 만 선행 + 재시도
      # 해서 네트워크 플래키함을 흡수하고, 이후 build 는 캐시된 상태로 한 번에.
      - name: Prefetch dependencies (retry on transient HTTP fail)
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if zig build --fetch=all; then
              echo "All dependencies fetched (attempt $i)"
              exit 0
            fi
            if [[ $i -eq 5 ]]; then
              echo "ERROR: dependency fetch failed after 5 attempts" >&2
              exit 1
            fi
            echo "Fetch attempt $i failed; retrying in 10s..."
            sleep 10
          done

      - name: Build + package (${{ matrix.arch }})
        shell: bash
        # `-Doptimize=ReleaseFast` 명시 — #200 으로 build.zig default 가 Debug
        # 로 바뀐 이후 release artifact 는 안전을 위해 *명시* 적용.
        run: zig build package -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseFast

      - name: Verify artifacts
        shell: bash
        run: |
          ZIP="zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-${{ matrix.arch }}.zip"
          SHA="$ZIP.sha256"
          if [[ ! -f "$ZIP" || ! -f "$SHA" ]]; then
            echo "ERROR: expected artifacts missing"
            ls -la zig-out/release/ || true
            exit 1
          fi
          echo "zip    : $ZIP ($(stat -c %s "$ZIP") bytes)"
          echo "sha256 : $(cat "$SHA")"

      # 두 matrix 작업이 *같은 release tag* 에 artifact append.
      # action-gh-release 는 동일 tag 의 release 가 이미 있으면 metadata
      # (name / body / prerelease) 갱신 + files 만 추가. 두 작업이 순서
      # 무관하게 동작.
      - name: Create / append GitHub Release (${{ matrix.arch }})
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: dist/release-notes/${{ steps.vars.outputs.tag }}.md
          files: |
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-${{ matrix.arch }}.zip
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-${{ matrix.arch }}.zip.sha256
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-rc') || contains(steps.vars.outputs.tag, '-beta') || contains(steps.vars.outputs.tag, '-alpha') }}
          fail_on_unmatched_files: true

  # macOS 빌드는 Apple Silicon runner (macos-15 = aarch64) 에서 cross-build 로
  # aarch64-macos + x86_64-macos 두 target 을 만든 후 `lipo -create` 로 universal
  # binary (Mach-O fat) 로 합쳐 단일 DMG 로 배포 — Intel + Apple Silicon 모두 실행
  # 가능 (#133, dist/macos/package.sh).
  #
  # Apple Developer 계정이 없어 ad-hoc 서명 — 사용자 첫 다운로드 시 quarantine
  # 우회 (`xattr -d com.apple.quarantine ./TildaZ.app`) + Input Monitoring /
  # Accessibility 권한 한 번 부여 필요. CI 빌드의 ad-hoc identity 는 stable 이라
  # 다음 릴리즈에서도 권한 유지.
  release-macos:
    runs-on: macos-15
    steps:
      - name: Resolve tag / version
        id: vars
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 1

      # mlugg/setup-zig — community mirror list fallback 내장. Windows job 의
      # cross-drive 이슈는 macOS 에 없어 use-cache 도 default (true) 로 둠.
      - name: Setup Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Verify Zig
        run: zig version

      - name: Sanity checks (version / release notes / pinned deps)
        run: |
          set -euo pipefail
          BZIG_VER=$(sed -n 's/^const tildaz_version = "\([^"]*\)";.*/\1/p' build.zig)
          # prerelease (-rc* / -beta* / -alpha*) tag 는 base version 만 build.zig 와 매칭.
          BASE_VER="${{ steps.vars.outputs.version }}"
          BASE_VER="${BASE_VER%-*}"
          if [[ "$BZIG_VER" != "$BASE_VER" ]]; then
            echo "ERROR: build.zig tildaz_version ($BZIG_VER) != tag base version ($BASE_VER, full tag ${{ steps.vars.outputs.tag }})"
            exit 1
          fi
          NOTES="dist/release-notes/${{ steps.vars.outputs.tag }}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "ERROR: release notes missing at $NOTES"
            exit 1
          fi

      - name: Prefetch dependencies
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if zig build --fetch=all; then
              exit 0
            fi
            [[ $i -eq 5 ]] && exit 1
            sleep 10
          done

      - name: Build + package
        # `-Doptimize=ReleaseFast` 명시 (#200) — default 가 Debug 가 된 후
        # 매크로 OS package 도 명시 적용.
        run: zig build package -Doptimize=ReleaseFast

      - name: Verify artifacts
        run: |
          DMG="zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-macos.dmg"
          SHA="$DMG.sha256"
          if [[ ! -f "$DMG" || ! -f "$SHA" ]]; then
            echo "ERROR: expected artifacts missing"
            ls -la zig-out/release/ || true
            exit 1
          fi
          echo "dmg    : $DMG ($(stat -f %z "$DMG") bytes)"
          echo "sha256 : $(cat "$SHA")"
          echo "universal binary architectures:"
          lipo -info "zig-out/TildaZ.app/Contents/MacOS/tildaz"

      # Windows job 과 같은 tag 면 같은 release 에 file 추가 (append).
      # softprops/action-gh-release 의 default 동작.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          files: |
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-macos.dmg
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-macos.dmg.sha256
          draft: false
          # vX.Y.Z-rc* / -beta* 같이 prerelease 표기 포함된 tag 면 GitHub Release
          # 의 prerelease 플래그도 같이 set — release listing 에서 stable 위에
          # 안 올라오게 (#133 RC 검증).
          prerelease: ${{ contains(steps.vars.outputs.tag, '-rc') || contains(steps.vars.outputs.tag, '-beta') || contains(steps.vars.outputs.tag, '-alpha') }}
          fail_on_unmatched_files: true

  # Linux 배포 — 4 format × 2 arch = 8 artifact (#202).
  # ubuntu-22.04 단일 runner 에서 모든 (arch, format) cross-build / cross-package:
  #   - zig 가 x86_64 호스트에서 aarch64-linux-gnu 빌드 가능 (LLVM cross)
  #   - 우리 의존성 모두 runtime dlopen → host glibc 와 무관
  #   - dpkg-deb / rpmbuild / appimagetool 모두 binary metadata 만 다루지 host
  #     arch 와 무관 (포함 binary 가 cross-built 면 그대로 패키징)
  # glibc minor 는 .2.28 pin — RHEL 8 / Debian 10 / Ubuntu 18.04 부터 호환.
  release-linux:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        format: [tar.gz, deb, rpm, AppImage]
        include:
          - arch: x86_64
            zig_target: x86_64-linux-gnu.2.28
          - arch: aarch64
            zig_target: aarch64-linux-gnu.2.28
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve tag / version
        id: vars
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 1

      - name: Setup Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Verify Zig
        run: zig version

      # format 별 호스트 도구. tar.gz 만 표준 (POSIX) — 추가 설치 0.
      # dpkg-deb 는 ubuntu 기본 (build-essential 또는 dpkg-dev). rpm 는 별 install.
      # appimagetool 은 package.sh 가 자동 다운로드.
      - name: Install packaging tools
        run: |
          set -euo pipefail
          case "${{ matrix.format }}" in
              tar.gz)
                  echo "tar.gz — no extra tools needed"
                  ;;
              deb)
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq dpkg-dev
                  dpkg-deb --version
                  ;;
              rpm)
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq rpm
                  rpmbuild --version
                  ;;
              AppImage)
                  # appimagetool 자체는 package.sh 가 다운로드. FUSE 는
                  # --appimage-extract-and-run 으로 회피.
                  echo "AppImage — appimagetool downloaded on demand"
                  ;;
          esac

      - name: Sanity checks (version / release notes)
        run: |
          set -euo pipefail
          BZIG_VER=$(sed -n 's/^const tildaz_version = "\([^"]*\)";.*/\1/p' build.zig)
          # prerelease (-rc* / -beta* / -alpha*) tag 는 base version 만 build.zig 와 매칭.
          BASE_VER="${{ steps.vars.outputs.version }}"
          BASE_VER="${BASE_VER%-*}"
          if [[ "$BZIG_VER" != "$BASE_VER" ]]; then
            echo "ERROR: build.zig tildaz_version ($BZIG_VER) != tag base version ($BASE_VER, full tag ${{ steps.vars.outputs.tag }})"
            exit 1
          fi
          NOTES="dist/release-notes/${{ steps.vars.outputs.tag }}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "ERROR: release notes missing at $NOTES"
            exit 1
          fi

      - name: Prefetch dependencies
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if zig build --fetch=all; then
              exit 0
            fi
            [[ $i -eq 5 ]] && exit 1
            sleep 10
          done

      - name: Build + package (${{ matrix.arch }} / ${{ matrix.format }})
        # `-Doptimize=ReleaseFast` 명시 (#200) — default 가 Debug 가 된 후
        # Linux release artifact 도 명시 적용.
        run: zig build package -Dtarget=${{ matrix.zig_target }} -Dformat=${{ matrix.format }} -Doptimize=ReleaseFast

      - name: Resolve artifact name
        id: artifact
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          case "$ARCH" in
              x86_64)  DEBARCH=amd64 ;;
              aarch64) DEBARCH=arm64 ;;
          esac
          case "${{ matrix.format }}" in
              tar.gz)   NAME="tildaz-v${VERSION}-linux-${ARCH}.tar.gz" ;;
              deb)      NAME="tildaz_${VERSION}_${DEBARCH}.deb" ;;
              rpm)      NAME="tildaz-${VERSION}-1.${ARCH}.rpm" ;;
              AppImage) NAME="TildaZ-${VERSION}-${ARCH}.AppImage" ;;
          esac
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "path=zig-out/release/$NAME" >> "$GITHUB_OUTPUT"

      - name: Verify artifact
        run: |
          set -euo pipefail
          P="${{ steps.artifact.outputs.path }}"
          S="$P.sha256"
          if [[ ! -f "$P" || ! -f "$S" ]]; then
            echo "ERROR: artifact missing — expected: $P + $S"
            ls -la zig-out/release/ || true
            exit 1
          fi
          echo "artifact : $P ($(stat -c %s "$P") bytes)"
          echo "sha256   : $(cat "$S")"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.artifact.outputs.path }}.sha256
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-rc') || contains(steps.vars.outputs.tag, '-beta') || contains(steps.vars.outputs.tag, '-alpha') }}
          fail_on_unmatched_files: true
