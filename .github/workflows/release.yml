name: Release

# 트리거
#   - 태그 푸시 (v*): dist/release.sh 가 tag + push 하면 자동 실행
#   - workflow_dispatch: 수동 재시도 / Actions 단독 실행. 태그 이름 입력 필수.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v0.2.9)'
        required: true

permissions:
  contents: write   # gh release create 에 필요

# Node.js 20 deprecation (2026-09-16 제거 예정) 회피. actions/checkout@v4 와
# softprops/action-gh-release@v2 가 아직 Node 20 번들이라 runner 가 강제 Node
# 24 로 실행. 2026-06-02 부터 default 가 24 로 바뀌면 이 env 는 redundant
# 이지만 그때까지 deprecation 경고 + 호환성 보장 위한 안전한 사전 적용.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release-windows:
    runs-on: windows-2022
    steps:
      - name: Resolve tag / version
        id: vars
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 1

      # Zig 공식 URL 에서 직접 다운로드. setup-zig 액션은 mirror 404 로 깨진 전적이
      # 있고, 릴리즈 워크플로우는 자주 돌지 않아 캐싱 이득도 작음. 의존성 0.
      #
      # tar 는 Windows System32 의 bsdtar 를 명시적으로 사용. Git Bash 의 기본
      # `tar` 는 GNU tar 라 Windows 경로의 콜론 (`D:\...`) 을 `host:path` 로
      # 오해해서 `Cannot connect to D:` 로 터짐. System32 의 bsdtar 는 Windows
      # 네이티브라 그 문제 없음.
      #
      # Zig 설치와 글로벌 캐시를 모두 D: 드라이브 (RUNNER_TEMP) 로 강제.
      # windows-2022 러너는 checkout 이 D: 에 떨어지는데 기본 zig global cache 는
      # `C:\Users\runneradmin\AppData\Local\zig` 라 크로스 드라이브. 그러면
      # `std.fs.path.relative(C:\...\, D:\...)` 가 상대경로를 못 만들고 absolute
      # 를 리턴해서 Zig 의 Run step (`convertPathArg` 내부 assert) 이 터짐.
      # 동일 드라이브로 통일해 해결.
      - name: Setup Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-windows-${ZIG_VERSION}.zip"
          ZIG_ZIP="${RUNNER_TEMP}/zig.zip"
          ZIG_ROOT="${RUNNER_TEMP}/zig"
          WIN_TAR="/c/Windows/System32/tar.exe"
          echo "Downloading $ZIG_URL"
          curl -fsSL --retry 3 -o "$ZIG_ZIP" "$ZIG_URL"
          mkdir -p "$ZIG_ROOT"
          "$WIN_TAR" -xf "$ZIG_ZIP" -C "$ZIG_ROOT"
          ZIG_BIN="${ZIG_ROOT}/zig-x86_64-windows-${ZIG_VERSION}"
          if [[ ! -x "$ZIG_BIN/zig.exe" ]]; then
            echo "ERROR: zig.exe not found at $ZIG_BIN" >&2
            ls -la "$ZIG_ROOT" || true
            exit 1
          fi
          echo "$ZIG_BIN" >> "$GITHUB_PATH"
          echo "ZIG_GLOBAL_CACHE_DIR=${RUNNER_TEMP}/zig-global-cache" >> "$GITHUB_ENV"
          echo "zig bin           : $ZIG_BIN"
          echo "zig global cache  : ${RUNNER_TEMP}/zig-global-cache"

      - name: Verify Zig
        shell: bash
        run: zig version

      - name: Sanity checks (version / release notes / pinned deps)
        shell: bash
        run: |
          set -euo pipefail

          BZIG_VER=$(sed -n 's/^const tildaz_version = "\([^"]*\)";.*/\1/p' build.zig)
          if [[ "$BZIG_VER" != "${{ steps.vars.outputs.version }}" ]]; then
            echo "ERROR: build.zig tildaz_version ($BZIG_VER) != tag version (${{ steps.vars.outputs.version }})"
            exit 1
          fi

          NOTES="dist/release-notes/${{ steps.vars.outputs.tag }}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "ERROR: release notes missing at $NOTES"
            exit 1
          fi

          # build.zig.zon 의 github archive URL 은 전부 특정 SHA 로 pin 되어야 함.
          # refs/heads/ · refs/tags/ 같은 rolling reference 는 upstream 이 움직이면
          # CI fetch 가 해시 불일치로 터지므로 금지. (과거 c41a9ef → e10e78f 회귀로
          # 한 번 깨진 뒤 v0.2.10 에서 다시 핀 + 이 check 추가)
          BAD=$(grep -E '\.url[[:space:]]*=[[:space:]]*"https://github\.com/' build.zig.zon | grep -v -E '/archive/[0-9a-f]{40}\.tar\.gz"' || true)
          if [[ -n "$BAD" ]]; then
            echo "ERROR: build.zig.zon 에 rolling / non-SHA dependency URL 이 있음:"
            echo "$BAD"
            echo ""
            echo "github archive URL 은 반드시"
            echo "  https://github.com/<org>/<repo>/archive/<40-hex-sha>.tar.gz"
            echo "형식이어야 합니다. refs/heads/ 나 refs/tags/ 는 금지."
            echo ""
            echo "갱신하려면: ./dist/update-ghostty.sh"
            exit 1
          fi

          echo "build.zig version : $BZIG_VER"
          echo "release notes     : $NOTES"
          echo "pinned deps       : OK"

      # Zig 0.15 의 Windows HTTP client 가 github.com 에서 transitive deps
      # (ghostty 아래 imgui, vaxis 아래 zigimg / uucode 등) 를 받을 때 가끔
      # `HttpConnectionClosing` / `WriteFailed` 로 깨짐. fetch 만 선행 + 재시도
      # 해서 네트워크 플래키함을 흡수하고, 이후 build 는 캐시된 상태로 한 번에.
      - name: Prefetch dependencies (retry on transient HTTP fail)
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if zig build --fetch=all; then
              echo "All dependencies fetched (attempt $i)"
              exit 0
            fi
            if [[ $i -eq 5 ]]; then
              echo "ERROR: dependency fetch failed after 5 attempts" >&2
              exit 1
            fi
            echo "Fetch attempt $i failed; retrying in 10s..."
            sleep 10
          done

      - name: Build + package
        shell: bash
        run: zig build package

      - name: Verify artifacts
        shell: bash
        run: |
          ZIP="zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-x64.zip"
          SHA="$ZIP.sha256"
          if [[ ! -f "$ZIP" || ! -f "$SHA" ]]; then
            echo "ERROR: expected artifacts missing"
            ls -la zig-out/release/ || true
            exit 1
          fi
          echo "zip    : $ZIP ($(stat -c %s "$ZIP") bytes)"
          echo "sha256 : $(cat "$SHA")"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: dist/release-notes/${{ steps.vars.outputs.tag }}.md
          files: |
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-x64.zip
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-x64.zip.sha256
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-rc') || contains(steps.vars.outputs.tag, '-beta') || contains(steps.vars.outputs.tag, '-alpha') }}
          fail_on_unmatched_files: true

  # macOS 빌드는 Apple Silicon (aarch64) 전용. Apple Developer 계정이 없어
  # ad-hoc 서명 — 사용자 첫 다운로드 시 quarantine 우회 (`xattr -d
  # com.apple.quarantine ./TildaZ.app`) + Input Monitoring / Accessibility
  # 권한 한 번 부여 필요. CI 빌드의 ad-hoc identity 는 stable 이라 다음
  # 릴리즈에서도 권한 유지.
  release-macos:
    runs-on: macos-15
    steps:
      - name: Resolve tag / version
        id: vars
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 1

      - name: Setup Zig 0.15.2
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-aarch64-macos-${ZIG_VERSION}.tar.xz"
          ZIG_TAR="${RUNNER_TEMP}/zig.tar.xz"
          ZIG_ROOT="${RUNNER_TEMP}/zig"
          curl -fsSL --retry 3 -o "$ZIG_TAR" "$ZIG_URL"
          mkdir -p "$ZIG_ROOT"
          tar -xf "$ZIG_TAR" -C "$ZIG_ROOT"
          ZIG_BIN="${ZIG_ROOT}/zig-aarch64-macos-${ZIG_VERSION}"
          echo "$ZIG_BIN" >> "$GITHUB_PATH"
          echo "ZIG_GLOBAL_CACHE_DIR=${RUNNER_TEMP}/zig-global-cache" >> "$GITHUB_ENV"

      - name: Verify Zig
        run: zig version

      - name: Sanity checks (version / release notes / pinned deps)
        run: |
          set -euo pipefail
          BZIG_VER=$(sed -n 's/^const tildaz_version = "\([^"]*\)";.*/\1/p' build.zig)
          if [[ "$BZIG_VER" != "${{ steps.vars.outputs.version }}" ]]; then
            echo "ERROR: build.zig tildaz_version ($BZIG_VER) != tag (${{ steps.vars.outputs.version }})"
            exit 1
          fi
          NOTES="dist/release-notes/${{ steps.vars.outputs.tag }}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "ERROR: release notes missing at $NOTES"
            exit 1
          fi

      - name: Prefetch dependencies
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if zig build --fetch=all; then
              exit 0
            fi
            [[ $i -eq 5 ]] && exit 1
            sleep 10
          done

      - name: Build + package
        run: zig build package

      - name: Verify artifacts
        run: |
          DMG="zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-macos.dmg"
          SHA="$DMG.sha256"
          if [[ ! -f "$DMG" || ! -f "$SHA" ]]; then
            echo "ERROR: expected artifacts missing"
            ls -la zig-out/release/ || true
            exit 1
          fi
          echo "dmg    : $DMG ($(stat -f %z "$DMG") bytes)"
          echo "sha256 : $(cat "$SHA")"
          echo "universal binary architectures:"
          lipo -info "zig-out/TildaZ.app/Contents/MacOS/tildaz"

      # Windows job 과 같은 tag 면 같은 release 에 file 추가 (append).
      # softprops/action-gh-release 의 default 동작.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          files: |
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-macos.dmg
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-macos.dmg.sha256
          draft: false
          # vX.Y.Z-rc* / -beta* 같이 prerelease 표기 포함된 tag 면 GitHub Release
          # 의 prerelease 플래그도 같이 set — release listing 에서 stable 위에
          # 안 올라오게 (#133 RC 검증).
          prerelease: ${{ contains(steps.vars.outputs.tag, '-rc') || contains(steps.vars.outputs.tag, '-beta') || contains(steps.vars.outputs.tag, '-alpha') }}
          fail_on_unmatched_files: true
