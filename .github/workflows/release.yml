name: Release

# 트리거
#   - 태그 푸시 (v*): dist/release.sh 가 tag + push 하면 자동 실행
#   - workflow_dispatch: 수동 재시도 / Actions 단독 실행. 태그 이름 입력 필수.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v0.2.9)'
        required: true

permissions:
  contents: write   # gh release create 에 필요

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Resolve tag / version
        id: vars
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 1

      # Zig 공식 URL 에서 직접 다운로드. setup-zig 액션은 mirror 404 로 깨진 전적이
      # 있고, 릴리즈 워크플로우는 자주 돌지 않아 캐싱 이득도 작음. 의존성 0.
      # curl + tar 둘 다 windows-2022 러너 기본 제공 (tar 는 bsdtar 라 zip 압축 해제 가능).
      - name: Setup Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-windows-${ZIG_VERSION}.zip"
          ZIG_ZIP="${RUNNER_TEMP}/zig.zip"
          ZIG_ROOT="C:/zig"
          echo "Downloading $ZIG_URL"
          curl -fsSL --retry 3 -o "$ZIG_ZIP" "$ZIG_URL"
          mkdir -p "$ZIG_ROOT"
          tar -xf "$ZIG_ZIP" -C "$ZIG_ROOT"
          ZIG_BIN="${ZIG_ROOT}/zig-x86_64-windows-${ZIG_VERSION}"
          if [[ ! -x "$ZIG_BIN/zig.exe" ]]; then
            echo "ERROR: zig.exe not found at $ZIG_BIN" >&2
            ls -la "$ZIG_ROOT" || true
            exit 1
          fi
          echo "$ZIG_BIN" >> "$GITHUB_PATH"
          echo "zig bin : $ZIG_BIN"

      - name: Verify Zig
        shell: bash
        run: zig version

      - name: Sanity checks (version / release notes)
        shell: bash
        run: |
          BZIG_VER=$(sed -n 's/^const tildaz_version = "\([^"]*\)";.*/\1/p' build.zig)
          if [[ "$BZIG_VER" != "${{ steps.vars.outputs.version }}" ]]; then
            echo "ERROR: build.zig tildaz_version ($BZIG_VER) != tag version (${{ steps.vars.outputs.version }})"
            exit 1
          fi
          NOTES="dist/release-notes/${{ steps.vars.outputs.tag }}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "ERROR: release notes missing at $NOTES"
            exit 1
          fi
          echo "build.zig version : $BZIG_VER"
          echo "release notes     : $NOTES"

      - name: Build + package
        shell: bash
        run: zig build package

      - name: Verify artifacts
        shell: bash
        run: |
          ZIP="zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-x64.zip"
          SHA="$ZIP.sha256"
          if [[ ! -f "$ZIP" || ! -f "$SHA" ]]; then
            echo "ERROR: expected artifacts missing"
            ls -la zig-out/release/ || true
            exit 1
          fi
          echo "zip    : $ZIP ($(stat -c %s "$ZIP") bytes)"
          echo "sha256 : $(cat "$SHA")"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: dist/release-notes/${{ steps.vars.outputs.tag }}.md
          files: |
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-x64.zip
            zig-out/release/tildaz-${{ steps.vars.outputs.tag }}-win-x64.zip.sha256
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
